---
openapi: 3.0.1
info:
  title: Stock API
  version: v1
  description: API สำหรับจัดการสินค้าคงคลัง
servers:
- url: http://localhost:3000
  description: Development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
          enum:
          - electronics
          - clothing
          - food
          - other
        in_stock:
          type: boolean
        created_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
          - admin
          - staff
        created_at:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        error:
          type: string
    Errors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
paths:
  "/api/v1/auth/register":
    post:
      summary: สมัครสมาชิก
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: สมัครสำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    "$ref": "#/components/schemas/User"
        '422':
          description: ข้อมูลไม่ถูกต้อง
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Errors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: '123456'
                password_confirmation:
                  type: string
                  example: '123456'
                name:
                  type: string
                  example: John Doe
                role:
                  type: string
                  enum:
                  - admin
                  - staff
              required:
              - email
              - password
              - password_confirmation
              - name
  "/api/v1/auth/login":
    post:
      summary: เข้าสู่ระบบ
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: เข้าสู่ระบบสำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    "$ref": "#/components/schemas/User"
        '401':
          description: อีเมลหรือรหัสผ่านไม่ถูกต้อง
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@test.com
                password:
                  type: string
                  example: '123456'
              required:
              - email
              - password
  "/api/v1/auth/me":
    get:
      summary: ดูข้อมูลตัวเอง
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: สำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    "$ref": "#/components/schemas/User"
        '401':
          description: ไม่ได้ login
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/products":
    get:
      summary: ดูสินค้าทั้งหมด
      tags:
      - Products
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      - name: category
        in: query
        required: false
        schema:
          type: string
      - name: in_stock
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: สำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Product"
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      per_page:
                        type: integer
                      total_count:
                        type: integer
                      total_pages:
                        type: integer
        '401':
          description: ไม่ได้ login
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: สร้างสินค้า
      tags:
      - Products
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: สร้างสำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Product"
        '422':
          description: ข้อมูลไม่ถูกต้อง
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Errors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  type: object
                  properties:
                    name:
                      type: string
                      example: iPhone 15
                    price:
                      type: number
                      example: 35000
                    stock:
                      type: integer
                      example: 10
                    category:
                      type: string
                      enum:
                      - electronics
                      - clothing
                      - food
                      - other
                  required:
                  - name
                  - price
                  - stock
                  - category
  "/api/v1/products/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: ดูสินค้าชิ้นเดียว
      tags:
      - Products
      security:
      - bearerAuth: []
      responses:
        '200':
          description: สำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Product"
        '404':
          description: ไม่พบสินค้า
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: แก้ไขสินค้า
      tags:
      - Products
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: แก้ไขสำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Product"
        '404':
          description: ไม่พบสินค้า
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  type: object
                  properties:
                    name:
                      type: string
                    price:
                      type: number
                    stock:
                      type: integer
                    category:
                      type: string
    delete:
      summary: ลบสินค้า
      tags:
      - Products
      security:
      - bearerAuth: []
      responses:
        '200':
          description: ลบสำเร็จ
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '403':
          description: สิทธิ์ไม่เพียงพอ
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
